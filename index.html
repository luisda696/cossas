<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Murciélago Animado</title>
    <style>
        body {
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .bat {
            width: 32px;
            height: 32px;
            background-image: url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/16192/bat-sprite.png');
            background-repeat: no-repeat;
            transform: scale(4);
            animation: flap 0.4s steps(6) infinite;
        }

        @keyframes flap {
            to {
                background-position: -192px 0;
            }
        }
    </style>
</head>
<body>

    <div class="bat"></div>

</body>
</html>
